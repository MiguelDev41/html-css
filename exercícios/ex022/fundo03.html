<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 100vh;
            margin: 0px;
            padding: 0px;
            background-image: url(imagens/pattern001.png);
            background-repeat: no-repeat;
            background-position: center center;
        }

        .container {
            background-color: black;
            color: white;
            text-align: center;
            border-radius: 10px;
            margin: 20px auto;
            width: 300px;
            padding: 5px;
            box-shadow: 10px 10px 10px ;
        }

        .container h1 {
            margin: 0px;
            padding: 0px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Esse é meu quadrado centralizado </h1>
    </div>
</body>
</html>
