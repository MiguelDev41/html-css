<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #F2E6D8;
        }

        h1 {
            text-align: center;
            font-size: 49px;
            color: #593E2E;
        }

        p {
            text-align: justify;
        }

        #passe, #fim {
            text-align: center;
            color: #555934;
        }

        #escondido {
            text-decoration: underline;
        }
        div > p {
            display: none;
        }

        div:hover > p{
            display: block;
            font-size: 35px;
            color: #555934;
            background-color: #8C5B3E;
        }
    </style>
</head>
<body>
    <h1>Exemplo de hover</h1>
    <p id="passe">Passe o mouse no texto abaixo.</p>
    <div>
        Passe o mouse aqui! 
        <p id="escondido">TEXTO ESCONDIDO...</p>
    </div>

    <p id="fim">Fim do exemplo!</p>
</body>
</html>
