<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem adaptavel</title>
</head>
<body>
    <h1>Imagem adaptavel</h1>
    <hr>

    <p>A imagem a seguir se modifica de acordo com o tamanho da sua tela:</p>

    <picture>
        <source media="(max-width: 300px)" srcset="imagens/foto-100.png" type="image/png">
        <source media="(max-width: 900px)" srcset="imagens/foto-300.png" type="image/png">
        <img src="imagens/foto-1000.png" alt="Imagem adaptável">
    </picture>
</body>
</html>
