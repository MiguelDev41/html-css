<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de position</title>
    <style>
        .box {
            width: 400px;
            height: 400px;
            border: 1px solid black;
            position: relative;
            background-color: salmon;
            margin: 20px auto;
        }

        .item1,.item2, .item3, .item4 {
            width: 150px;
            height: 150px;
            border: 3px dashed black ;
        }

        .item1 {
            background-color: blue;
            position: absolute;
            bottom: 0px;
            right: 0px;
        }

        .item2 {
            background-color: red;
        }

        .item3 {
            background-color: blueviolet;
            position: absolute;
            top: 0px;
            right: 0px;
        }

        .item4 {
            background-color: chartreuse;
            position: absolute;
            bottom: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="item1"></div>
        <div class="item2"></div>
        <div class="item3"></div>
        <div class="item4"></div>
    </div>
</body>
</html>
